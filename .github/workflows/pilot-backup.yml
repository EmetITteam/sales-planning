name: Pilot Backup (every 30min)

# ⚠️ Тимчасовий workflow для пілотного запуску 2026-05-15.
# Кладе snapshots у backups/pilot/<stamp>/ кожні 30 хв.
# ВИМКНУТИ (видалити cron / файл) після стабілізації пілоту — інакше буде
# спам у backup branch.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pilot-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Supabase backup (pilot prefix)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_DIR_PREFIX: pilot
        run: node scripts/backup-supabase.mjs

      - name: Commit snapshot to `backups` branch
        run: |
          set -euo pipefail

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # 1) Виносимо щойно створену папку у /tmp (поза робочим деревом).
          NEW_DIR=$(ls -1d backups/pilot/*/ | head -n 1)
          STAMP=$(basename "$NEW_DIR")
          echo "→ New pilot backup: $STAMP"

          mkdir -p /tmp/sp-backup-pilot
          cp -r "$NEW_DIR" "/tmp/sp-backup-pilot/$STAMP"
          rm -rf backups

          # 2) Перемикаємось на гілку backups.
          if git ls-remote --exit-code --heads origin backups > /dev/null 2>&1; then
            git fetch origin backups:backups
            git checkout backups
          else
            echo '❌ Гілка backups має існувати (створюється основним workflow)'
            exit 1
          fi

          # 3) Кладемо у backups/pilot/<stamp>/ і комітимо.
          mkdir -p backups/pilot
          cp -r "/tmp/sp-backup-pilot/$STAMP" "backups/pilot/$STAMP"
          git add "backups/pilot/$STAMP"

          if git diff --staged --quiet; then
            echo '→ Нічого нового'
            exit 0
          fi

          git commit -m "Pilot backup $STAMP"
          git push origin backups
          echo "→ Pushed backups/pilot/$STAMP"
